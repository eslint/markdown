name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - name: Install Packages
              run: npm install
              env:
                  CI: true
            - name: Lint
              run: npm run lint
            - name: Lint Files, Dependencies, & Exports
              run: npm run lint:unused

    format:
        name: File Format
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - name: Install Packages
              run: npm install
              env:
                  CI: true
            - name: Prettier Check
              run: npm run fmt:check

    test:
        name: Test
        strategy:
            matrix:
                os: [ubuntu-latest]
                eslint: [9.15.0, 9.x, 10.x]
                node: [25.x, 24.x, 22.x, 20.x, "20.19.0"]
                include:
                    - os: windows-latest
                      eslint: latest
                      node: lts/*
                    - os: macOS-latest
                      eslint: latest
                      node: lts/*
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install Node.js ${{ matrix.node }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
            - name: Install Packages
              run: npm install
              env:
                  CI: true
            - name: Install ESLint@${{ matrix.eslint }}
              run: npm install -D eslint@${{ matrix.eslint }} @eslint/js@${{ matrix.eslint }}
            - name: Test
              run: npm run test

    test_types:
        name: Test Types
        strategy:
            fail-fast: false
            matrix:
                eslint:
                    [
                        9.15.x,
                        9.16.x,
                        9.17.x,
                        9.18.x,
                        9.19.x,
                        9.20.x,
                        9.21.x,
                        9.22.x,
                        9.23.x,
                        9.24.x,
                        9.25.x,
                        9.26.x,
                        9.27.x,
                        9.28.x,
                        9.29.x,
                        9.30.x,
                        9.31.x,
                        9.32.x,
                        9.33.x,
                        9.34.x,
                        9.35.x,
                        9.36.x,
                        9.37.x,
                        9.38.x,
                        9.39.0,
                        9.39.1,
                        9.39.2,
                        9.39.3,
                        9.39.4,
                        9.x,
                        10.x,
                    ]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install dependencies
              run: npm install
            - name: Install ESLint@${{ matrix.eslint }}
              run: npm install -D eslint@${{ matrix.eslint }} @eslint/js@${{ matrix.eslint }}
            - name: Check Types
              run: npm run test:types

    are_the_types_wrong:
        name: Are the types wrong?
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install Packages
              run: npm install
            - name: Check validity of type definitions
              run: npm run lint:types

    jsr_test:
        name: Verify JSR Publish
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install Packages
              run: npm install
            - name: Run --dry-run
              run: npm run test:jsr
